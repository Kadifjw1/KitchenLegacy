name: Client model smoke

on:
  push:
    branches:
      - diagnose/invisible-sword-runtime
  pull_request:
    branches:
      - main
    paths:
      - 'src/main/java/ru/theframetrip/worldsmith/client/ClientModelProbe.java'
      - 'src/main/resources/assets/worldsmith/models/item/**'
      - 'src/main/resources/assets/worldsmith/textures/item/**'
      - 'build.gradle'
      - '.github/workflows/client-model-smoke.yml'
  workflow_dispatch:

jobs:
  client-model-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      WORLDSMITH_MODEL_PROBE: '1'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Materialize Krovotok resources
        run: |
          python3 codex_tasks/krovotok/verify_asset_archive.py
          python3 codex_tasks/krovotok/materialize_krovotok_resources.py

      - name: Launch client and inspect baked models
        shell: bash
        run: |
          set +e
          timeout 300s xvfb-run -a ./gradlew runClient --no-daemon \
            > client-console.log 2>&1
          status=$?
          echo "client_exit_status=$status" | tee client-exit-status.txt
          set -e

          if test -f run/logs/latest.log; then
            cp run/logs/latest.log latest.log
          else
            touch latest.log
          fi

          grep -Eai \
            'WORLDSMITH_MODEL_PROBE|krovotok|prah|unable to load model|failed to load model|missing model|exception loading model|texture.*not found|using missing texture|could not load' \
            latest.log client-console.log \
            > model-diagnostics.txt || true

          cat model-diagnostics.txt
          test -s latest.log
          grep -q 'WORLDSMITH_MODEL_PROBE_COMPLETE' model-diagnostics.txt
          test "$(grep -c 'WORLDSMITH_MODEL_PROBE_FAILED' model-diagnostics.txt || true)" -eq 0

      - name: Upload client diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: client-model-diagnostics
          path: |
            latest.log
            client-console.log
            client-exit-status.txt
            model-diagnostics.txt
          if-no-files-found: warn
