name: Prah build fix

on:
  pull_request:
    paths:
      - "src/main/java/ru/theframetrip/worldsmith/ability/prah/**"
      - "codex_tasks/prah/verify_prah_build_fix.py"
      - ".github/workflows/prah-build-fix.yml"
  workflow_dispatch:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Verify Prah ArmorStand API usage
        run: python3 codex_tasks/prah/verify_prah_build_fix.py

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --no-daemon
