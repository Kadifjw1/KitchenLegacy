name: Build Worldsmith

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify committed Krovotok charge assets
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/krovotok-diagnostics
          python3 codex_tasks/krovotok/verify_user_charge_assets.py 2>&1 \
            | tee build/krovotok-diagnostics/verify-user-charge-assets.log

      - name: Verify Krovotok source archive
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/krovotok-diagnostics
          python3 codex_tasks/krovotok/verify_asset_archive.py 2>&1 \
            | tee build/krovotok-diagnostics/verify-archive.log

      - name: Materialize Krovotok resources
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/krovotok-diagnostics
          python3 codex_tasks/krovotok/materialize_krovotok_resources.py 2>&1 \
            | tee build/krovotok-diagnostics/materialize.log

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Verify sword models inside JAR
        shell: bash
        run: |
          set -euo pipefail
          jar_file="$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
          test -n "$jar_file"

          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/models/item/krovotok.json'
          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/models/item/krovotok_base.json'
          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/models/item/prah.json'
          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/textures/item/tex_prah.png'
          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/textures/item/krovotok.png'
          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/textures/item/krovotok.png.mcmeta'
          jar tf "$jar_file" | grep -Fx 'ru/theframetrip/worldsmith/client/particle/KrovotokParticle.class'

          for charge in 0 1 2 3 4 5; do
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/models/item/krovotok_charge_${charge}.json"
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/textures/item/krovotok_charge_${charge}.png"
          done

          for particle in \
            krovotok_blood_mist \
            krovotok_blood_spark \
            krovotok_blood_pulse \
            krovotok_blood_burst \
            krovotok_life_drain; do
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/particles/${particle}.json"
          done

          particle_frame_count="$(jar tf "$jar_file" | grep -Ec '^assets/worldsmith/textures/particle/krovotok/.*\.png$')"
          test "$particle_frame_count" -eq 30

          python3 - "$jar_file" <<'PY'
          import json
          import pathlib
          import sys
          import zipfile

          jar_path = pathlib.Path(sys.argv[1])
          source_root = pathlib.Path('src/main/resources/assets/worldsmith')
          expected_counts = {0: 170, 1: 170, 2: 171, 3: 170, 4: 170, 5: 170}

          with zipfile.ZipFile(jar_path) as archive:
              manifest = json.loads(
                  archive.read('assets/worldsmith/krovotok_generated_assets.json')
              )
              assert manifest['user_charge_assets_authoritative'] is True
              assert manifest['stage_2_intentional_split_cube'] is True

              prah = json.loads(
                  archive.read('assets/worldsmith/models/item/prah.json')
              )
              assert prah.get('parent') != 'item/handheld'
              assert len(prah['elements']) == 194
              assert prah['textures']['0'] == 'worldsmith:item/tex_prah'

              for charge in range(6):
                  model_name = f'assets/worldsmith/models/item/krovotok_charge_{charge}.json'
                  item_texture_name = f'assets/worldsmith/textures/item/krovotok_charge_{charge}.png'

                  model = json.loads(archive.read(model_name))
                  assert model.get('parent') != 'item/handheld'
                  assert len(model['elements']) == expected_counts[charge]
                  assert model['texture_size'] == [64, 64]
                  assert model['textures']['0'] == f'worldsmith:item/krovotok_charge_{charge}'

                  source_texture = (
                      source_root / 'textures' / 'item' / f'krovotok_charge_{charge}.png'
                  ).read_bytes()
                  assert archive.read(item_texture_name) == source_texture
          PY

      - name: Upload Krovotok diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: krovotok-build-diagnostics
          path: build/krovotok-diagnostics/*.log
          if-no-files-found: ignore

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: worldsmith-jar
          path: build/libs/*.jar
