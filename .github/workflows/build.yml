name: Build Worldsmith

on:
  push:
    branches:
      - main
      - master
      - feature/krovotok-emissive-stages
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build Mod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Verify Krovotok source archive
        run: python3 codex_tasks/krovotok/verify_asset_archive.py

      - name: Materialize Krovotok stages and particles
        run: python3 codex_tasks/krovotok/materialize_krovotok_resources.py

      - name: Apply approved Koloss item transforms
        run: python3 codex_tasks/krovotok/apply_krovotok_display_transform.py

      - name: Verify approved Krovotok model lock
        run: python3 codex_tasks/krovotok/verify_krovotok_model_lock.py

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Verify Krovotok assets inside JAR
        shell: bash
        run: |
          set -euo pipefail
          jar_file="$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -n 1)"
          test -n "$jar_file"

          jar tf "$jar_file" | grep -Fx 'assets/worldsmith/models/item/krovotok_base.json'
          jar tf "$jar_file" | grep -Fx 'ru/theframetrip/worldsmith/client/render/KrovotokItemRenderer.class'
          jar tf "$jar_file" | grep -Fx 'ru/theframetrip/worldsmith/client/particle/KrovotokParticle.class'

          for stage in 0 1 2 3 4 5; do
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/textures/item/krovotok_stage_${stage}.png"
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/textures/item/krovotok_glow_${stage}.png"
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/models/item/krovotok_charge_${stage}.json"
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/models/item/krovotok_glow_${stage}.json"
          done

          for particle in \
            krovotok_blood_mist \
            krovotok_blood_spark \
            krovotok_blood_pulse \
            krovotok_blood_burst \
            krovotok_life_drain; do
            jar tf "$jar_file" | grep -Fx "assets/worldsmith/particles/${particle}.json"
          done

          particle_frame_count="$(jar tf "$jar_file" | grep -Ec '^assets/worldsmith/textures/particle/krovotok/.*\.png$')"
          test "$particle_frame_count" -eq 30

          python3 - "$jar_file" <<'PY'
          import json
          import sys
          import zipfile

          with zipfile.ZipFile(sys.argv[1]) as archive:
              model = json.loads(archive.read('assets/worldsmith/models/item/krovotok_base.json'))
          assert model['worldsmith_position_profile'] == 'koloss_approved_display_v1'
          assert min(element['from'][1] for element in model['elements']) == -7.5
          assert max(element['to'][1] for element in model['elements']) == 31.5
          assert model['display']['thirdperson_righthand']['rotation'] == [14, -88, 21]
          assert model['display']['thirdperson_righthand']['scale'] == [0.65, 0.65, 0.65]
          assert model['display']['firstperson_righthand']['scale'] == [0.65, 0.65, 0.65]
          PY

      - name: Upload mod jar
        uses: actions/upload-artifact@v4
        with:
          name: worldsmith-jar
          path: build/libs/*.jar
