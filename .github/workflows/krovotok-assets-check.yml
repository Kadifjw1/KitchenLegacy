name: Krovotok assets check

on:
  push:
    branches:
      - main
      - feature/krovotok-emissive-stages
    paths:
      - 'codex_tasks/krovotok/**'
      - 'src/main/resources/assets/worldsmith/models/item/krovotok*.json'
      - 'src/main/java/ru/theframetrip/worldsmith/client/render/KrovotokItemRenderer.java'
      - '.github/workflows/krovotok-assets-check.yml'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths:
      - 'codex_tasks/krovotok/**'
      - 'src/main/resources/assets/worldsmith/models/item/krovotok*.json'
      - 'src/main/java/ru/theframetrip/worldsmith/client/render/KrovotokItemRenderer.java'
      - '.github/workflows/krovotok-assets-check.yml'
      - '.gitignore'
  workflow_dispatch:

jobs:
  verify-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify historical particle archive
        run: python3 codex_tasks/krovotok/verify_asset_archive.py

      - name: Materialize emissive stages
        run: python3 codex_tasks/krovotok/materialize_krovotok_resources.py

      - name: Validate complete resource set
        shell: bash
        run: |
          set -euo pipefail
          base='src/generated/resources/assets/worldsmith'
          test -f "$base/models/item/krovotok_base.json"
          test -f "$base/krovotok_generated_assets.json"
          test -f build/generated/krovotok/krovotok_stages_master.bbmodel
          test "$(find "$base/textures/particle/krovotok" -name '*.png' | wc -l)" -eq 30
          test "$(find src/main/resources/assets/worldsmith/particles -name 'krovotok_*.json' | wc -l)" -eq 5
          for stage in 0 1 2 3 4 5; do
            test -f "$base/textures/item/krovotok_stage_${stage}.png"
            test -f "$base/textures/item/krovotok_glow_${stage}.png"
            test -f "src/main/resources/assets/worldsmith/models/item/krovotok_charge_${stage}.json"
            test -f "src/main/resources/assets/worldsmith/models/item/krovotok_glow_${stage}.json"
          done
          python3 - <<'PY'
          import json
          from pathlib import Path
          master = json.loads(Path('build/generated/krovotok/krovotok_stages_master.bbmodel').read_text())
          manifest = json.loads(Path('src/generated/resources/assets/worldsmith/krovotok_generated_assets.json').read_text())
          assert len(master['elements']) == 170
          assert len(master['textures']) == 12
          assert manifest['element_count'] == 170
          assert manifest['stage_count'] == 6
          assert manifest['emissive_masks'] == 6
          PY
          test -z "$(git status --short --untracked-files=all)"
