name: Krovotok assets check

on:
  push:
    branches:
      - main
      - fix/krovotok-complete-integration
    paths:
      - 'codex_tasks/krovotok/**'
      - '.github/workflows/krovotok-assets-check.yml'
      - '.gitignore'
  pull_request:
    branches:
      - main
    paths:
      - 'codex_tasks/krovotok/**'
      - '.github/workflows/krovotok-assets-check.yml'
      - '.gitignore'
  workflow_dispatch:

jobs:
  verify-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Krovotok archive
        shell: bash
        run: |
          set +e
          python3 codex_tasks/krovotok/verify_asset_archive.py 2>&1 | tee krovotok-asset-diagnostic.txt
          status=${PIPESTATUS[0]}
          echo "exit_status=$status" >> krovotok-asset-diagnostic.txt
          exit "$status"

      - name: Materialize missing binary assets
        run: python3 codex_tasks/krovotok/materialize_krovotok_resources.py

      - name: Validate complete resource set
        shell: bash
        run: |
          test -f src/generated/resources/assets/worldsmith/models/item/krovotok_base.json
          test -f src/generated/resources/assets/worldsmith/textures/item/krovotok.png
          test -f src/generated/resources/assets/worldsmith/textures/item/krovotok.png.mcmeta
          test -f src/generated/resources/assets/worldsmith/krovotok_generated_assets.json
          test "$(find src/generated/resources/assets/worldsmith/textures/particle/krovotok -name '*.png' | wc -l)" -eq 30
          test "$(find src/main/resources/assets/worldsmith/particles -name 'krovotok_*.json' | wc -l)" -eq 5
          test ! -d src/generated/resources/assets/worldsmith/particles || test -z "$(find src/generated/resources/assets/worldsmith/particles -name 'krovotok_*.json' -print -quit)"
          rm -f krovotok-asset-diagnostic.txt
          test -z "$(git status --short --untracked-files=all)"

      - name: Upload failure diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: krovotok-asset-diagnostic
          path: krovotok-asset-diagnostic.txt
          if-no-files-found: warn
